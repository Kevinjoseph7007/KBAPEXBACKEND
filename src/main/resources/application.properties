spring.application.name=KBapexbackend-java
server.port=8080
# PostgreSQL database configuration
    spring.datasource.url=jdbc:postgresql://localhost:5432/KBAPEX
spring.datasource.username=postgres
spring.datasource.password=root
spring.datasource.driver-class-name=org.postgresql.Driver

whatsapp.access.
whatsapp.api.url=https://graph.facebook.com/v22.0/985822697944349/messages
# Token you set in the Meta dashboard (WhatsApp > Configuration > Webhook) for verification.
# Override via the WHATSAPP_VERIFY_TOKEN environment variable.
whatsapp.verify.token=${WHATSAPP_VERIFY_TOKEN:changeme-verify-token}

# JPA configurations
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT auth. Override the secret via the JWT_SECRET environment variable in production.
app.jwt.secret=${JWT_SECRET:change-me-please-use-a-long-random-secret-value-0123456789}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Default admin user seeded on first boot (override in non-local environments).
app.admin.email=${ADMIN_EMAIL:admin@kbapex.com}
app.admin.password=${ADMIN_PASSWORD:admin123}

# Comma-separated list of origins allowed to call the API (the React dev server by default).
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}